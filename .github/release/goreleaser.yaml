version: 2
project_name: protoc-gen-openapi

before:
  hooks:
    - go mod tidy
    # NOTE: tests are intentionally not run here. The integration tests shell
    # out to `protoc`, which is not present on the release runner.

builds:
  - id: protoc-gen-openapi
    binary: protoc-gen-openapi
    main: ./
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: protoc-gen-openapi-archive
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance Improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - typo

# Homebrew cask, generated and committed to the tap on each release.
# (Replaces the deprecated `brews:` formula config, removed in GoReleaser v2.16.)
# The url + sha256 for every platform are filled in automatically from the
# archives above, so there is no checksum to hand-maintain.
homebrew_casks:
  # Cask is named with a `-solo` suffix to disambiguate this solo-io fork in the
  # tap; the installed binary is still `protoc-gen-openapi` so `protoc` can infer
  # the plugin from the `openapi_out` flag.
  - name: protoc-gen-openapi-solo
    # The archive ships a binary literally named `protoc-gen-openapi` (so protoc
    # can infer the plugin). Without this, GoReleaser defaults the cask's binary
    # stanza to the cask name (`protoc-gen-openapi-solo`), which isn't in the
    # archive, so `brew install` fails. (Replaces the deprecated `binary:` field.)
    binaries: [protoc-gen-openapi]
    repository:
      owner: the-protobuf-project
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: 'https://github.com/the-protobuf-project/protoc-gen-openapi-solo'
    description: 'protoc plugin that generates OpenAPI v3 specs from protobuf definitions'
    license: "Apache-2.0"
    ids:
      - protoc-gen-openapi-archive
    # The binary is not signed/notarized, so strip the macOS quarantine
    # attribute on install to stop Gatekeeper blocking it on first run.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/protoc-gen-openapi"]
          end

release:
  github:
    owner: the-protobuf-project
    # Must match the repo's CURRENT name. It was renamed to `-solo`, and the old
    # name 307-redirects — which breaks asset uploads to uploads.github.com.
    name: protoc-gen-openapi-solo
  # Delete and re-upload assets that already exist on the release, so re-running
  # a release on the same tag (e.g. after a partial/failed run) is idempotent
  # instead of failing with GitHub's 422 "already_exists" error.
  replace_existing_artifacts: true
  draft: false
  prerelease: auto
  name_template: 'v{{.Version}}'
  header: |
    ## What's New in v{{.Version}}

    `protoc-gen-openapi` is a plugin for the protocol buffer compiler that
    generates OpenAPI v3 specs from protobuf definitions.

    ### Installation

    #### Homebrew
    ```bash
    brew install the-protobuf-project/tap/protoc-gen-openapi-solo
    ```
